name: Update Lead HOT Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 4 * * *"
    - cron: "0 8 * * *"
    - cron: "30 11 * * *"

permissions:
  contents: write

concurrency:
  group: lead-hot-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate latest data
        run: node scripts/generate-lead-hot.mjs config/lead-hot.config.json

      - name: Commit refreshed data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/潜客HOT数据
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: update lead data"
          git push
